name: CI

# This hack builds through WSL with the Windows RGBDS .exe binaries (see
# CLAUDE.md "Build & verification"); the upstream stock Linux/macOS `make`
# jobs that pret/pokegold ships do not model that toolchain and produced
# byte-divergent / red-for-no-reason runs, so they were removed. The
# release-smoke audit is the portable CI floor.

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  python-audits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run release smoke audit
        run: |
          python3 tools/audit/check_release_smoke.py
